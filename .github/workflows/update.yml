name: Update NukkitHub Plugin Index

on:
  # schedule is temporarily disabled until this workflow is stable again.
  # schedule:
  #   - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'auto'
        type: choice
        options:
          - auto
          - update
          - discover
      force:
        description: 'Force full scan (ignore last_sync)'
        required: false
        default: false
        type: boolean

concurrency:
  group: sync-index
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: MemoriesOfTime
          repositories: NukkitHubIndex

      - name: Checkout NukkitHubIndex
        uses: actions/checkout@v6
        with:
          repository: MemoriesOfTime/NukkitHubIndex
          path: NukkitHubIndex
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Download nukkitindexer
        run: |
          curl -fsSL https://github.com/${{ github.repository }}/releases/download/nukkitindexer-latest/nukkitindexer -o nukkitindexer
          chmod +x nukkitindexer

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Get current date
        id: date
        run: echo "today=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Restore update progress
        uses: actions/cache/restore@v4
        with:
          path: .update_progress
          key: update-progress-${{ steps.date.outputs.today }}-${{ github.run_id }}
          restore-keys: |
            update-progress-${{ steps.date.outputs.today }}-

      - name: Restore last sync
        uses: actions/cache/restore@v4
        with:
          path: .last_sync
          key: last-sync-${{ github.run_id }}
          restore-keys: |
            last-sync-

      - name: Restore data cache
        uses: actions/cache/restore@v4
        with:
          path: .data_cache.bin.gz
          key: data-cache-${{ github.run_id }}
          restore-keys: |
            data-cache-

      - name: Determine run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.mode }}" != "auto" ]; then
            echo "mode=${{ inputs.mode }}" >> $GITHUB_OUTPUT
          else
            TODAY=$(date -u +%Y-%m-%d)
            if [ -f .last_sync ] && grep -q "$TODAY" .last_sync; then
              echo "mode=update" >> $GITHUB_OUTPUT
            else
              echo "mode=discover" >> $GITHUB_OUTPUT
            fi
          fi
          echo "Running in mode: $(cat $GITHUB_OUTPUT | grep mode | cut -d= -f2)"

      - name: Write GitHub App private key
        env:
          APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
        run: echo "$APP_PRIVATE_KEY" > /tmp/app-private-key.pem

      - name: Run update
        if: steps.mode.outputs.mode == 'update'
        run: |
          ./nukkitindexer update \
            --app-id ${{ vars.APP_ID }} \
            --installation-id ${{ vars.APP_INSTALLATION_ID }} \
            --private-key-file /tmp/app-private-key.pem \
            --debug

      - name: Run discover
        if: steps.mode.outputs.mode == 'discover'
        run: |
          FORCE_FLAG=""
          if [ "${{ inputs.force }}" = "true" ]; then
            FORCE_FLAG="--force"
          fi
          ./nukkitindexer discover $FORCE_FLAG \
            --app-id ${{ vars.APP_ID }} \
            --installation-id ${{ vars.APP_INSTALLATION_ID }} \
            --private-key-file /tmp/app-private-key.pem \
            --debug

      - name: Cleanup private key
        if: always()
        run: rm -f /tmp/app-private-key.pem

      - name: Save update progress
        if: always() && hashFiles('.update_progress') != ''
        uses: actions/cache/save@v4
        with:
          path: .update_progress
          key: update-progress-${{ steps.date.outputs.today }}-${{ github.run_id }}

      - name: Save last sync
        if: always() && hashFiles('.last_sync') != ''
        uses: actions/cache/save@v4
        with:
          path: .last_sync
          key: last-sync-${{ github.run_id }}

      - name: Save data cache
        if: always() && hashFiles('.data_cache.bin.gz') != ''
        uses: actions/cache/save@v4
        with:
          path: .data_cache.bin.gz
          key: data-cache-${{ github.run_id }}

      - name: Check for changes
        id: changes
        run: |
          cd NukkitHubIndex
          git add -A
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
            echo "No changes detected, skipping commit and push"
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Changes detected"
          fi

      - name: Commit and push changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          cd NukkitHubIndex
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: sync plugin index"
          git push
